<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Trips — Countdown</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Trips">
<meta name="theme-color" content="#0b1020">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="icon" type="image/png" href="icon-512.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root{
    --bg:#0b1020; --panel:rgba(20,28,48,.72); --panel2:rgba(28,38,64,.8); --line:rgba(255,255,255,.14);
    --txt:#fff; --mut:#aab6d4; --accent:#ffd25a; --good:#34d399;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0b1020;color:var(--txt);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;padding:0 0 50px;position:relative;overflow-x:hidden;text-shadow:0 1px 2px rgba(0,0,0,.4)}
  /* animated sky */
  .bg{position:fixed;inset:0;z-index:-2;background:
    radial-gradient(900px 500px at 15% -5%,#243b6b 0%,transparent 60%),
    radial-gradient(800px 500px at 90% 10%,#3a2b5e 0%,transparent 55%),
    linear-gradient(180deg,#0e1530 0%,#0b1020 60%)}
  .stars{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
  .star{position:absolute;background:#fff;border-radius:50%;opacity:.5;animation:tw 4s ease-in-out infinite}
  @keyframes tw{50%{opacity:.12}}
  @media (prefers-reduced-motion:reduce){.star{animation:none}}
  header{padding:26px 18px 8px;text-align:center}
  header h1{font-size:24px;font-weight:800;letter-spacing:-.3px}
  header p{color:var(--mut);font-size:13px;margin-top:4px}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px}
  /* hero next trip */
  .hero{margin:18px 0 6px;border-radius:22px;padding:22px 20px;text-align:center;position:relative;overflow:hidden;
    border:1px solid var(--line);box-shadow:0 16px 40px rgba(0,0,0,.4)}
  .hero .lbl{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;opacity:.9}
  .hero .city{font-size:30px;font-weight:800;margin:4px 0 2px;letter-spacing:-.4px}
  .hero .big{font-size:62px;font-weight:300;letter-spacing:-2px;line-height:1.05;margin:6px 0 0}
  .hero .big b{font-weight:800}
  .hero .units{display:flex;justify-content:center;gap:18px;margin-top:8px;font-variant-numeric:tabular-nums}
  .hero .units div{min-width:54px}
  .hero .units .n{font-size:26px;font-weight:800}
  .hero .units .u{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.85}
  .hero .when{margin-top:10px;font-size:13.5px;opacity:.95;font-weight:600}
  /* trip cards */
  h2.sec{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--mut);margin:22px 4px 8px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px 16px 14px;margin:11px 0;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 10px 28px rgba(0,0,0,.3)}
  .card .top{display:flex;align-items:center;gap:13px}
  .card .flag{font-size:34px;width:46px;text-align:center;flex:0 0 auto}
  .card .ttl{flex:1;min-width:0}
  .card .ttl .ct{font-size:20px;font-weight:800;letter-spacing:-.2px}
  .card .ttl .dt{color:var(--mut);font-size:12.5px;margin-top:1px}
  .card .cd{flex:0 0 auto;text-align:right}
  .card .cd .d{font-size:30px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
  .card .cd .l{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--mut)}
  .card.soon .cd .d{color:var(--accent)}
  .card.now .cd .d{color:var(--good)}
  .bar{height:6px;border-radius:4px;background:rgba(255,255,255,.1);margin:13px 0 12px;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),#ff8a66)}
  .rows{display:grid;grid-template-columns:1fr;gap:0}
  .row{display:flex;align-items:flex-start;gap:11px;padding:8px 0;border-top:1px dashed var(--line)}
  .row:first-child{border-top:0}
  .row .e{font-size:17px;width:24px;text-align:center;flex:0 0 auto}
  .row .tx{flex:1;min-width:0;font-size:13.5px}
  .row .tx b{font-weight:700}
  .row .tx small{display:block;color:var(--mut);font-size:11.5px;margin-top:1px}
  a.row{color:var(--txt);text-decoration:none}
  a.row .tx b{color:#7cc0ff}
  a.row:active{opacity:.6}
  .foot{color:var(--mut);font-size:11.5px;text-align:center;margin:24px 0 6px;line-height:1.6;padding:0 10px}
</style>
</head>
<body>
<div class="bg"></div>
<div class="stars" id="stars" aria-hidden="true"></div>

<header>
  <h1>✈️ My Trips</h1>
  <p id="sub">Countdown to your next adventures</p>
</header>

<div class="wrap">
  <div id="heroEl"></div>
  <h2 class="sec">All upcoming trips</h2>
  <div id="cardsEl"></div>
  <div class="foot">
    Live countdowns · details synced from your Airbnb reservations.<br>
    Confirmation codes, gate codes &amp; Wi‑Fi are kept in your private <b>Vacation</b> calendar, not here.
  </div>
</div>

<script>
/* ============ TRIP DATA (public-safe: no codes / wifi / confirmation #) ============ */
const TRIPS=[
  { city:"Austin", region:"Texas", flag:"🤠", emojiBg:"linear-gradient(135deg,#b5651d33,#e8a33d22)",
    inISO:"2026-07-20T15:00:00", outISO:"2026-07-24T11:00:00",
    place:"Luxe Stay at The Domain · Pool & Gym", host:"Arletys",
    where:"The Domain — Century Oaks Terrace, Austin, TX", guests:1,
    maps:"https://maps.apple.com/?q=The%20Domain%20Austin%20TX" },
  { city:"Tokyo", region:"Setagaya, Japan", flag:"🗼", emojiBg:"linear-gradient(135deg,#e0556633,#5b86ad22)",
    inISO:"2026-09-19T12:00:00", outISO:"2026-10-02T12:00:00",
    place:"15 min to Shibuya / Shinjuku / Shimokitazawa · 2BR", host:"Rina & Akira",
    where:"Daita, Setagaya City, Tokyo · 4 min walk from Umegaoka Stn (Odakyu line)", guests:2,
    maps:"https://maps.apple.com/?q=Umegaoka%20Station%20Setagaya%20Tokyo" },
  { city:"San Juan", region:"Puerto Rico", flag:"🌴", emojiBg:"linear-gradient(135deg,#1aa9b033,#ffd25a22)",
    inISO:"2026-10-04T16:00:00", outISO:"2026-10-09T11:00:00",
    place:"Rare Beachfront Getaway · Pool, Gym + Balcony", host:"Kat",
    where:"Condado del Mar, Avenida Ashford, San Juan, PR", guests:2,
    maps:"https://maps.apple.com/?q=Condado%20del%20Mar%20Avenida%20Ashford%20San%20Juan" },
];

const $=s=>document.querySelector(s);
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function fmtRange(a,b){ const o={month:"short",day:"numeric"};
  const da=new Date(a), db=new Date(b);
  const ya=da.getFullYear(), yb=db.getFullYear();
  let s=da.toLocaleDateString("en-US",o)+" – "+db.toLocaleDateString("en-US",o);
  return s+", "+yb; }
function fmtT(iso){ return new Date(iso).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}); }
function fmtDay(iso){ return new Date(iso).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}); }

function diff(toISO){ return new Date(toISO).getTime()-Date.now(); }
function parts(ms){ const s=Math.max(0,Math.floor(ms/1000));
  return { d:Math.floor(s/86400), h:Math.floor(s%86400/3600), m:Math.floor(s%3600/60), s:s%60 }; }

function stars(){ let h=""; for(let i=0;i<60;i++){ const x=Math.random()*100,y=Math.random()*100,sz=(Math.random()*2+1).toFixed(1),dl=(Math.random()*4).toFixed(1);
  h+=`<div class="star" style="left:${x}vw;top:${y}vh;width:${sz}px;height:${sz}px;animation-delay:${dl}s"></div>`; }
  $("#stars").innerHTML=h; }

function status(t){ const now=Date.now(), a=new Date(t.inISO).getTime(), b=new Date(t.outISO).getTime();
  if(now>=a&&now<=b) return "now"; if(a-now < 14*86400000) return "soon"; return ""; }

function render(){
  // sort by check-in, keep upcoming + in-progress
  const list=TRIPS.map(t=>({...t})).sort((x,y)=>new Date(x.inISO)-new Date(y.inISO));
  const next=list.find(t=>new Date(t.outISO).getTime()>=Date.now())||list[0];
  // HERO
  const p=parts(diff(next.inISO)); const live=Date.now()>=new Date(next.inISO).getTime();
  $("#heroEl").innerHTML=`<div class="hero" style="background:${next.emojiBg},var(--panel2)">
    <div class="lbl">${live?"✈️ You're on this trip":"Next trip"}</div>
    <div class="city">${next.flag} ${esc(next.city)}</div>
    ${live? `<div class="big"><b>Enjoy ${esc(next.city)}!</b></div>`
          : `<div class="units">
              <div><div class="n">${p.d}</div><div class="u">days</div></div>
              <div><div class="n">${String(p.h).padStart(2,"0")}</div><div class="u">hrs</div></div>
              <div><div class="n">${String(p.m).padStart(2,"0")}</div><div class="u">min</div></div>
              <div><div class="n">${String(p.s).padStart(2,"0")}</div><div class="u">sec</div></div>
            </div>`}
    <div class="when">${esc(fmtRange(next.inISO,next.outISO))} · check‑in ${fmtDay(next.inISO)} ${fmtT(next.inISO)}</div>
  </div>`;
  // CARDS
  $("#cardsEl").innerHTML=list.map(t=>{
    const dd=parts(diff(t.inISO)).d, st=status(t);
    const total=new Date(t.inISO)-new Date("2026-06-23"), done=Math.min(100,Math.max(2,100-100*diff(t.inISO)/(total||1)));
    const cd= st==="now" ? `<div class="d">★</div><div class="l">here now</div>`
            : `<div class="d">${dd}</div><div class="l">days to go</div>`;
    return `<div class="card ${st}">
      <div class="top">
        <div class="flag">${t.flag}</div>
        <div class="ttl"><div class="ct">${esc(t.city)}</div><div class="dt">${esc(t.region)} · ${esc(fmtRange(t.inISO,t.outISO))}</div></div>
        <div class="cd">${cd}</div>
      </div>
      <div class="bar"><i style="width:${done.toFixed(0)}%"></i></div>
      <div class="rows">
        <div class="row"><span class="e">🏠</span><span class="tx"><b>${esc(t.place)}</b><small>Hosted by ${esc(t.host)} · ${t.guests} guest${t.guests>1?"s":""}</small></span></div>
        <a class="row" href="${t.maps}" target="_blank" rel="noopener"><span class="e">📍</span><span class="tx"><b>${esc(t.where)}</b><small>Tap to open in Maps</small></span></a>
        <div class="row"><span class="e">🛎️</span><span class="tx">Check‑in <b>${fmtDay(t.inISO)}</b> after ${fmtT(t.inISO)}<small>Check‑out ${fmtDay(t.outISO)} before ${fmtT(t.outISO)}</small></span></div>
      </div>
    </div>`;
  }).join("");
}

stars(); render();
setInterval(render, 1000);

if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07070f">
<title>🚀 Mission Control</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-512.png">
<style>
:root{--bg:#07070f;--tile:#0d0d1d;--muted:#8b93b8;--line:#262645;
  --teal:#00f5d4;--pink:#f15bb5;--purp:#c084fc;--blue:#38bdf8}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:#eaf6ff;font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
#now{background:linear-gradient(-45deg,#0d0d2b,#1b1040,#0a2a3f,#0d0d2b);background-size:300% 300%;animation:drift 12s ease infinite;
  padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 14px;display:flex;justify-content:space-between;align-items:baseline;font-weight:800}
#now .d{font-size:15px}#now .d small{display:block;font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
#now .c{font-size:22px;font-variant-numeric:tabular-nums}
@keyframes drift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
main{padding:12px;max-width:640px;margin:0 auto}
#hero{display:none}
#hero .tile{box-shadow:0 0 24px rgba(241,91,181,.18);margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tile{background:var(--tile);border-radius:14px;padding:12px 14px;position:relative;font-weight:600;font-size:13px;cursor:pointer;overflow:hidden}
.tile::before{content:"";position:absolute;inset:-1px;border-radius:15px;padding:1px;
  background:linear-gradient(90deg,#00f5d4,#f15bb5,#9b5de5,#00bbf9,#00f5d4);background-size:200% 100%;animation:glow 3s linear infinite;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;z-index:0;pointer-events:none}
.tile>*{position:relative;z-index:1}
@keyframes glow{to{background-position:200% 0%}}
.lbl{font-size:11px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;font-weight:700;display:flex;justify-content:space-between;align-items:center;gap:6px}
.big{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:6px;display:block;line-height:1.25}
.sub{font-size:11px;color:var(--muted);font-weight:600;margin-top:3px;display:block}
.dot{width:8px;height:8px;border-radius:50%;background:#ff3b5c;display:inline-block;margin-right:6px;animation:pulse 1.2s infinite;vertical-align:baseline}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.chip{font-size:9px;color:var(--muted);border:1px solid var(--line);border-radius:8px;padding:1px 6px;font-weight:700;flex:none}
.a-teal{color:var(--teal);text-shadow:0 0 12px rgba(0,245,212,.55)}
.a-pink{color:var(--pink);text-shadow:0 0 12px rgba(241,91,181,.55)}
.a-purp{color:var(--purp);text-shadow:0 0 12px rgba(155,93,229,.55)}
.a-blue{color:var(--blue);text-shadow:0 0 10px rgba(0,187,249,.5)}
.a-red{color:#f87171;text-shadow:0 0 12px rgba(248,113,113,.5)}
@keyframes flashy{0%{background:#26264d}100%{background:var(--tile)}}
.flash{animation:flashy .8s ease-out}
.wcteams{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;margin-top:8px;flex-wrap:wrap}
.wcteams .fl{font-size:22px}
.mono b{min-width:2ch;display:inline-block;text-align:right}
.mono small{font-size:10px;color:var(--muted);font-weight:700;margin-right:4px}
</style>
</head>
<body>
<header id="now">
  <div class="d"><span id="nowDate">—</span><small id="nowCity">locating…</small></div>
  <div class="c" id="nowClock">—:—</div>
</header>
<main>
  <div id="hero"></div>
  <div id="grid" class="g2">
    <div class="tile" id="t-wc" onclick="location.href='https://jangelog1.github.io/worldcup2026/'">
      <div class="lbl"><span>⚽ World Cup 2026</span></div><span class="big">—</span><span class="sub"></span></div>
    <div class="tile" id="t-stk" onclick="location.href='../stocks/'">
      <div class="lbl"><span>📈 Portfolio</span></div><span class="big">—</span><span class="sub"></span></div>
    <div class="tile" id="t-trip" onclick="location.href='../trips/'">
      <div class="lbl"><span>✈️ Next trip</span></div><span class="big">—</span><span class="sub"></span></div>
    <div class="tile" id="t-wx" onclick="location.href='../weather/'">
      <div class="lbl"><span>🌤️ Weather</span></div><span class="big">—</span><span class="sub"></span></div>
    <div class="tile" id="t-sox" onclick="location.href='../whitesox/'">
      <div class="lbl"><span>⚾ White Sox</span></div><span class="big">—</span><span class="sub"></span></div>
    <div class="tile" id="t-bears" onclick="location.href='../bears/'">
      <div class="lbl"><span>🐻 Bears</span></div><span class="big">—</span><span class="sub"></span></div>
    <div class="tile" id="t-euro" onclick="location.href='https://jangelog1.github.io/euro-football/'">
      <div class="lbl"><span>🇪🇸 Euro footy</span></div><span class="big">—</span><span class="sub"></span></div>
  </div>
</main>
<script>
/* ============ TILE RUNTIME ============ */
const TILES=[];const $=s=>document.querySelector(s);
function reg(id,mod){TILES.push({id,el:$('#t-'+id),...mod,state:mod.snapshot});}
function setVal(el,html,sub){
  const b=el.querySelector('.big');
  if(b.innerHTML!==html){b.innerHTML=html;el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');}
  const s=el.querySelector('.sub');if(s&&sub!==undefined)s.innerHTML=sub;
}
function chip(el,text){
  let c=el.querySelector('.chip');
  if(!text){if(c)c.remove();return;}
  if(!c){c=document.createElement('span');c.className='chip';el.querySelector('.lbl').appendChild(c);}
  c.textContent=text;
}
function pickHero(es){return es.reduce((a,b)=>b&&(!a||b.p>a.p)?b:a,null);}
let passing=false;
async function pass(){
  if(passing)return;passing=true;
  await Promise.allSettled(TILES.map(async t=>{
    try{t.state=await t.fetch();t.ok=true;chip(t.el,null);}
    catch(e){t.ok=false;t.state=t.state||t.snapshot;chip(t.el,'snapshot');}
    try{t.render(t.el,t.state);}catch(e){}
  }));
  const h=pickHero(TILES.map(t=>t.hero?t.hero(t.state):null).filter(Boolean));
  const hb=$('#hero');
  if(h){hb.innerHTML=h.html;hb.style.display='block';}
  else{hb.innerHTML='';hb.style.display='none';}
  passing=false;
}
/* tiles register below (Tasks 3-8), then boot at end of script */

/* ============ NOW STRIP + TRIPS ============ */
const TRIPS=[["Austin","2026-07-20"],["Tokyo","2026-09-19"],["San Juan","2026-10-04"]];
function nextTrip(){const now=Date.now();
  const t=TRIPS.map(([n,d])=>[n,new Date(d+"T12:00:00")]).find(([,d])=>d>now);
  return t?{name:t[0],at:t[1]}:null;}
function cdHTML(ms,small){const s=Math.max(0,Math.floor(ms/1000));
  const d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60),ss=s%60;
  const seg=(v,u)=>`<b>${String(v).padStart(2,'0')}</b><small>${u}</small>`;
  return `<span class="a-purp mono" style="display:inline-flex;gap:2px;align-items:baseline${small?';font-size:15px':''}">${seg(d,'D')}${seg(h,'H')}${seg(m,'M')}${seg(ss,'S')}</span>`;}
reg('trip',{
  snapshot:null,
  fetch:async()=>nextTrip(),
  render:(el,t)=>{
    if(!t){setVal(el,'<span class="sub">No trips booked</span>','');return;}
    el.querySelector('.lbl span').textContent='✈️ '+t.name;
    setVal(el,cdHTML(t.at-Date.now(),true),t.at.toLocaleDateString("en-US",{weekday:'short',month:'short',day:'numeric'}));
  },
  hero:t=>{
    if(!t)return null;
    const ms=t.at-Date.now();
    if(ms<86400000)return {p:90,html:`<div class="tile"><div class="lbl"><span>✈️ ${t.name} — departure day!</span></div><span class="big">${cdHTML(ms)}</span></div>`};
    return {p:10-((ms/60000)/100000),html:`<div class="tile" onclick="location.href='../trips/'"><div class="lbl"><span>✈️ Next up: ${t.name}</span></div><span class="big">${cdHTML(ms)}</span></div>`};
  }
});
function tickNow(){
  const n=new Date();
  $('#nowClock').textContent=n.toLocaleTimeString("en-US",{hour:'numeric',minute:'2-digit'});
  $('#nowDate').textContent=n.toLocaleDateString("en-US",{weekday:'long',month:'long',day:'numeric'});
  const t=TILES.find(x=>x.id==='trip');
  if(t&&t.state){const b=t.el.querySelector('.big');b.innerHTML=cdHTML(t.state.at-Date.now(),true);
    const hb=$('#hero .big');if(hb&&$('#hero .lbl span')&&$('#hero .lbl span').textContent.includes(t.state.name))hb.innerHTML=cdHTML(t.state.at-Date.now());}
}
tickNow();setInterval(tickNow,1000);

/* ============ WEATHER + CITY (Open-Meteo, keyless) ============ */
let GEO=null; // {lat,lon,city} shared with Now strip
function wx(code,day){ day=day==null?1:day;
  const m={
    0:[day?"☀️":"🌙","Clear"],1:[day?"🌤️":"🌙","Mainly clear"],2:[day?"⛅":"☁️","Partly cloudy"],3:["☁️","Overcast"],
    45:["🌫️","Fog"],48:["🌫️","Rime fog"],
    51:["🌦️","Light drizzle"],53:["🌦️","Drizzle"],55:["🌧️","Heavy drizzle"],56:["🌧️","Freezing drizzle"],57:["🌧️","Freezing drizzle"],
    61:["🌦️","Light rain"],63:["🌧️","Rain"],65:["🌧️","Heavy rain"],66:["🌧️","Freezing rain"],67:["🌧️","Freezing rain"],
    71:["🌨️","Light snow"],73:["🌨️","Snow"],75:["❄️","Heavy snow"],77:["🌨️","Snow grains"],
    80:["🌦️","Light showers"],81:["🌧️","Showers"],82:["⛈️","Violent showers"],
    85:["🌨️","Snow showers"],86:["❄️","Snow showers"],
    95:["⛈️","Thunderstorm"],96:["⛈️","Thunderstorm + hail"],99:["⛈️","Severe thunderstorm"]
  };
  return m[code]||["🌡️","—"];
}
function locate(){
  return new Promise(res=>{
    const fallback={lat:41.88,lon:-87.63,city:"Chicago"};
    if(!navigator.geolocation)return res(fallback);
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude,lon:p.coords.longitude,city:null}),
      ()=>res(fallback),{timeout:5000,maximumAge:600000});
  });
}
reg('wx',{
  snapshot:{t:'—',e:'🌤️',lbl:''},
  fetch:async()=>{
    if(!GEO){GEO=await locate();
      if(!GEO.city){
        try{const g=await(await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${GEO.lat}&longitude=${GEO.lon}&localityLanguage=en`)).json();
          GEO.city=g.city||g.locality||"Here";}catch(e){GEO.city="Here";}
      }
      $('#nowCity').textContent=GEO.city;
    }
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${GEO.lat}&longitude=${GEO.lon}&current=temperature_2m,weather_code,is_day&temperature_unit=fahrenheit`);
    const d=await r.json();const c=d.current;
    const [e,lbl]=wx(c.weather_code,c.is_day);
    return {t:Math.round(c.temperature_2m)+'°',e,lbl};
  },
  render:(el,s)=>setVal(el,`<span class="a-blue">${s.t} ${s.e}</span>`,s.lbl)
});

/* ============ WORLD CUP 2026 (FIFA, keyless) ============ */
const WC_FLAGS={France:"🇫🇷",Spain:"🇪🇸",England:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",Portugal:"🇵🇹",Argentina:"🇦🇷",Brazil:"🇧🇷",Germany:"🇩🇪",Netherlands:"🇳🇱",
 Belgium:"🇧🇪",Norway:"🇳🇴",USA:"🇺🇸",Morocco:"🇲🇦",Colombia:"🇨🇴",Mexico:"🇲🇽",Japan:"🇯🇵",Switzerland:"🇨🇭",Uruguay:"🇺🇾",
 Croatia:"🇭🇷",Senegal:"🇸🇳",Sweden:"🇸🇪",Australia:"🇦🇺",Ecuador:"🇪🇨","Ivory Coast":"🇨🇮",Austria:"🇦🇹",Canada:"🇨🇦",
 Scotland:"🏴󠁧󠁢󠁳󠁣󠁴󠁿","South Korea":"🇰🇷",Algeria:"🇩🇿",Egypt:"🇪🇬",Czechia:"🇨🇿",Paraguay:"🇵🇾",Ghana:"🇬🇭",Iran:"🇮🇷",
 "DR Congo":"🇨🇩",Tunisia:"🇹🇳","Cape Verde":"🇨🇻",Iraq:"🇮🇶",Jordan:"🇯🇴","New Zealand":"🇳🇿",Panama:"🇵🇦",Qatar:"🇶🇦",
 "Saudi Arabia":"🇸🇦","South Africa":"🇿🇦",Uzbekistan:"🇺🇿","Curaçao":"🇨🇼",Haiti:"🇭🇹","Türkiye":"🇹🇷","Bosnia and Herzegovina":"🇧🇦"};
const WC_ALIAS={"IR Iran":"Iran","Cabo Verde":"Cape Verde","Congo DR":"DR Congo","Korea Republic":"South Korea","Côte d'Ivoire":"Ivory Coast"};
const wcFl=n=>WC_FLAGS[n]||"⚽";
const wcNm=x=>(x&&x[0]&&x[0].Description)||"";
const wcAl=n=>WC_ALIAS[n]||n;
const WC_END=new Date("2026-07-20T04:00:00Z"); // day after the Jul 19 final
reg('wc',{
  snapshot:{live:null,next:null,over:false},
  fetch:async()=>{
    const r=await fetch("https://api.fifa.com/api/v3/calendar/matches?idCompetition=17&idSeason=285023&count=200&language=en",{cache:"no-store"});
    const d=await r.json();
    const ms=((d&&d.Results)||[]).map(m=>{
      const h=m.Home||{},a=m.Away||{},ld=m.LocalDate||m.Date||"";
      return {h:wcAl(wcNm(h.TeamName)),a:wcAl(wcNm(a.TeamName)),hs:h.Score,as:a.Score,
        st:m.MatchStatus,min:m.MatchTime||"",dt:new Date(m.Date),stage:wcNm(m.StageName)};
    });
    const live=ms.find(m=>m.st===3)||null;
    const next=ms.filter(m=>m.st===1&&m.h&&m.a).sort((x,y)=>x.dt-y.dt)[0]||null;
    return {live,next,over:Date.now()>WC_END&&!live&&!next};
  },
  render:(el,s)=>{
    if(s.over){el.style.display='none';return;}
    if(s.live){
      el.querySelector('.lbl span').innerHTML='<span class="dot"></span>⚽ WC 2026 · LIVE';
      setVal(el,`<span class="a-pink">${wcFl(s.live.h)} ${s.live.hs??0}–${s.live.as??0} ${wcFl(s.live.a)}</span>`,`${s.live.h} v ${s.live.a} · ${s.live.min}`);
    }else if(s.next){
      el.querySelector('.lbl span').innerHTML='⚽ World Cup 2026';
      const t=s.next.dt.toLocaleString("en-US",{weekday:'short',hour:'numeric',minute:'2-digit'});
      setVal(el,`${wcFl(s.next.h)} vs ${wcFl(s.next.a)}`,`${s.next.h} v ${s.next.a} · ${t}`);
    }else setVal(el,'🏆','Tournament — see bracket');
  },
  hero:s=>{
    if(!s.live)return null;
    return {p:100,html:`<div class="tile" onclick="location.href='https://jangelog1.github.io/worldcup2026/'">
      <div class="lbl"><span><span class="dot"></span>World Cup 2026 · ${s.live.stage}</span><span class="a-pink" style="font-size:12px;font-weight:800">${s.live.min}</span></div>
      <div class="wcteams"><span class="fl">${wcFl(s.live.h)}</span><span>${s.live.h}</span>
        <span class="big a-pink" style="margin:0 8px">${s.live.hs??0}–${s.live.as??0}</span>
        <span>${s.live.a}</span><span class="fl">${wcFl(s.live.a)}</span></div></div>`};
  }
});

/* ============ WHITE SOX (MLB statsapi, keyless) ============ */
const soxAbbr=n=>({"Detroit Tigers":"DET","Cleveland Guardians":"CLE","Kansas City Royals":"KC","Minnesota Twins":"MIN",
  "New York Yankees":"NYY","Boston Red Sox":"BOS","Chicago Cubs":"CUBS","Houston Astros":"HOU","Texas Rangers":"TEX",
  "Los Angeles Angels":"LAA","Oakland Athletics":"ATH","Seattle Mariners":"SEA","Tampa Bay Rays":"TB","Toronto Blue Jays":"TOR",
  "Baltimore Orioles":"BAL"}[n]||n.split(" ").pop().slice(0,3).toUpperCase());
function ymd(d){return d.toLocaleDateString("en-CA",{timeZone:"America/Chicago"});}
reg('sox',{
  snapshot:{mode:'none'},
  fetch:async()=>{
    const t=new Date(),y=new Date(t-864e5),w=new Date(+t+7*864e5);
    const r=await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&teamId=145&startDate=${ymd(y)}&endDate=${ymd(w)}`);
    const d=await r.json();
    const games=(d.dates||[]).flatMap(x=>x.games||[]);
    const side=g=>g.teams.home.team.id===145?['home','away']:['away','home'];
    const live=games.find(g=>g.status.abstractGameState==="Live");
    if(live){const [me,opp]=side(live);
      return {mode:'live',my:live.teams[me].score??0,their:live.teams[opp].score??0,opp:soxAbbr(live.teams[opp].team.name)};}
    const today=ymd(t);
    const fin=games.filter(g=>g.status.abstractGameState==="Final"&&g.officialDate===today).pop();
    if(fin){const [me,opp]=side(fin);const w2=fin.teams[me].score>fin.teams[opp].score;
      return {mode:'final',res:w2?'W':'L',my:fin.teams[me].score,their:fin.teams[opp].score,opp:soxAbbr(fin.teams[opp].team.name)};}
    const nxt=games.filter(g=>g.status.abstractGameState==="Preview").sort((a,b)=>new Date(a.gameDate)-new Date(b.gameDate))[0];
    if(nxt){const [,opp]=side(nxt);const gd=new Date(nxt.gameDate);
      const day=gd.toLocaleDateString("en-US",{timeZone:"America/Chicago",weekday:'short'});
      const tm=gd.toLocaleTimeString("en-US",{timeZone:"America/Chicago",hour:'numeric',minute:'2-digit'});
      return {mode:'next',day,tm,opp:soxAbbr(nxt.teams[opp].team.name),vs:nxt.teams.home.team.id===145?'vs':'@'};}
    return {mode:'none'};
  },
  render:(el,s)=>{
    if(s.mode==='live'){el.querySelector('.lbl span').innerHTML='<span class="dot"></span>⚾ Sox · LIVE';
      setVal(el,`<span class="a-teal">${s.my}–${s.their}</span>`,`vs ${s.opp}`);}
    else if(s.mode==='final')setVal(el,`<span class="${s.res==='W'?'a-teal':'a-red'}">${s.res} ${s.my}–${s.their}</span>`,`vs ${s.opp} · final`);
    else if(s.mode==='next')setVal(el,s.tm,`${s.day} ${s.vs} ${s.opp}`);
    else setVal(el,'—','No games scheduled');
  },
  hero:s=>s.mode==='live'?{p:99,html:`<div class="tile" onclick="location.href='../whitesox/'">
    <div class="lbl"><span><span class="dot"></span>White Sox · LIVE</span></div>
    <span class="big a-teal">SOX ${s.my}–${s.their} ${s.opp}</span></div>`}:null
});

/* ============ BEARS + EURO (TheSportsDB free key 3, best-effort) ============ */
async function tsdb(p){const r=await fetch(`https://www.thesportsdb.com/api/v1/json/3/${p}`);return r.json();}
function tsWhen(ts){const d=new Date(ts.replace(" ","T")+(/(Z|\+)/.test(ts)?"":"Z"));
  return {d,txt:d.toLocaleString("en-US",{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})};}
reg('bears',{
  snapshot:{mode:'snap'},
  fetch:async()=>{
    const n=await tsdb("eventsnext.php?id=134938");
    const e=(n.events||[])[0];
    if(e){const w=tsWhen(e.strTimestamp);
      const opp=e.strHomeTeam==="Chicago Bears"?["vs",e.strAwayTeam]:["@",e.strHomeTeam];
      return {mode:'next',when:w.txt,vs:opp[0],opp:opp[1].replace(/^(Los Angeles|New York|Green Bay|Kansas City|New England|San Francisco|Tampa Bay|New Orleans|Las Vegas)\s/,'').split(" ").pop()};}
    const l=await tsdb("eventslast.php?id=134938");
    const le=(l.results||[])[0];
    if(le)return {mode:'last',h:le.strHomeTeam,a:le.strAwayTeam,hs:le.intHomeScore,as:le.intAwayScore};
    throw new Error("no data");
  },
  render:(el,s)=>{
    if(s.mode==='next')setVal(el,s.when.split(", ").slice(1).join(" "),`${s.vs} ${s.opp}`);
    else if(s.mode==='last'){const bearsHome=s.h==="Chicago Bears";const my=bearsHome?s.hs:s.as,their=bearsHome?s.as:s.hs;
      setVal(el,`<span class="${+my>+their?'a-teal':'a-red'}">${+my>+their?'W':'L'} ${my}–${their}</span>`,'last game');}
    else setVal(el,'—','Off-season');
  }
});
reg('euro',{
  snapshot:{mode:'snap'},
  fetch:async()=>{
    const [rm,wh]=await Promise.all([tsdb("eventsnext.php?id=133738"),tsdb("eventsnext.php?id=133636")]);
    const pick=(d,tag)=>{const e=(d.events||[])[0];if(!e)return null;const w=tsWhen(e.strTimestamp);
      return {tag,when:w,ev:e.strEvent.replace(" vs "," v ")};};
    const both=[pick(rm,"RMA"),pick(wh,"WHU")].filter(Boolean).sort((a,b)=>a.when.d-b.when.d);
    if(!both.length)throw new Error("no fixtures");
    return {mode:'next',...both[0]};
  },
  render:(el,s)=>{
    if(s.mode==='next'){setVal(el,`<span style="font-size:16px">${s.tag==='RMA'?'⚪ Real Madrid':'⚒️ West Ham'}</span>`,`${s.ev} · ${s.when.txt}`);}
    else setVal(el,'—','No fixtures');
  }
});

/* ============ STOCKS (Yahoo via allorigins — proxy pattern lifted from ../stocks/) ============ */
const PROXY='https://api.allorigins.win/get?url=';
const Y='https://query1.finance.yahoo.com';
async function proxy(url,tries=4){ /* fewer tries than stocks app: glance-board favors fast paint; chip covers failure */
  for(let i=0;i<tries;i++){
    try{ const r=await fetch(PROXY+encodeURIComponent(url),{cache:'no-store'});
      if(r.ok){ const j=await r.json(); if(j&&j.contents&&j.contents.trim().length>5) return JSON.parse(j.contents); }
    }catch(e){}
    await new Promise(z=>setTimeout(z,Math.min(2500,600+i*450)));
  }
  throw new Error('proxy failed');
}
function marketOpen(){
  const n=new Date(),c=new Date(n.toLocaleString("en-US",{timeZone:"America/Chicago"}));
  const wd=c.getDay(),mins=c.getHours()*60+c.getMinutes();
  return wd>=1&&wd<=5&&mins>=510&&mins<=900; // 8:30–15:00 CT
}
reg('stk',{
  snapshot:{mode:'snap'},
  fetch:async()=>{
    let holdings={};try{holdings=JSON.parse(localStorage.getItem('stocks_holdings')||'{}');}catch(e){}
    const syms=Object.keys(holdings);
    if(!syms.length){
      const d=await proxy(`${Y}/v8/finance/spark?symbols=SPY&range=1d&interval=15m`);
      const v=d.SPY;const close=(v.close||[]).filter(x=>x!=null);
      const last=close[close.length-1],pc=v.chartPreviousClose;
      return {mode:'spy',pct:(last-pc)/pc*100};
    }
    const d=await proxy(`${Y}/v8/finance/spark?symbols=${syms.map(encodeURIComponent).join(',')}&range=1d&interval=15m`);
    let day=0,val=0,prev=0;
    for(const s of syms){const v=d[s];if(!v||typeof v!=='object')continue;
      const close=(v.close||[]).filter(x=>x!=null);
      const last=close.length?close[close.length-1]:null,pc=v.chartPreviousClose;
      if(last==null||pc==null)continue;
      const sh=+holdings[s].sh||0;
      day+=sh*(last-pc);val+=sh*last;prev+=sh*pc;}
    return {mode:'pf',day,pct:prev?day/prev*100:0};
  },
  render:(el,s)=>{
    if(s.mode==='pf'){const up=s.day>=0;
      setVal(el,`<span class="${up?'a-teal':'a-red'}">${up?'+':'−'}$${Math.abs(s.day).toFixed(0)} ${up?'▲':'▼'}</span>`,
        `${up?'+':''}${s.pct.toFixed(2)}% today`);}
    else if(s.mode==='spy'){const up=s.pct>=0;
      setVal(el,`<span class="${up?'a-teal':'a-red'}">SPY ${up?'+':''}${s.pct.toFixed(2)}%</span>`,'add holdings in Stocks app');}
    else setVal(el,'—','market data unavailable');
  },
  hero:s=>{
    if(s.mode!=='pf'||!marketOpen()||Math.abs(s.pct)<=1)return null;
    const up=s.day>=0;
    return {p:80,html:`<div class="tile" onclick="location.href='../stocks/'">
      <div class="lbl"><span>📈 Portfolio — big move</span></div>
      <span class="big ${up?'a-teal':'a-red'}">${up?'+':'−'}$${Math.abs(s.day).toFixed(0)} · ${up?'+':''}${s.pct.toFixed(2)}%</span></div>`};
  }
});

<style>
  :root{
    --bg:#0b1120; --panel:rgba(22,30,52,.72); --panel2:rgba(30,40,66,.85); --line:rgba(255,255,255,.13);
    --txt:#eef2fb; --mut:#9fb0d0; --accent:#b07cff; --warn:#ff8a66; --good:#34d399; --bad:#ff5c7c; --gold:#ffd25a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(900px 520px at 12% -8%,#1d2952 0%,transparent 58%),radial-gradient(800px 520px at 92% 6%,#2a2150 0%,transparent 55%),linear-gradient(180deg,#0e1530,#0b1120 60%);
    color:var(--txt);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;padding:0 0 56px;text-shadow:0 1px 2px rgba(0,0,0,.4)}
  .wrap{max-width:820px;margin:0 auto;padding:0 14px}
  /* header */
  header{padding:18px 14px 12px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(176,124,255,.10),transparent)}
  .htop{display:flex;align-items:center;justify-content:space-between;gap:10px;max-width:820px;margin:0 auto}
  .brand{font-size:20px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
  .toggle{display:inline-flex;border:1px solid var(--line);border-radius:22px;overflow:hidden;background:var(--panel)}
  .toggle button{background:transparent;border:0;color:var(--mut);padding:7px 14px;font-weight:800;font-size:13px;cursor:pointer}
  .toggle button.on{background:var(--accent);color:#0b1120}
  .sub{max-width:820px;margin:9px auto 0;color:var(--mut);font-size:12.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .sub b{color:var(--txt)}
  .statusbar{display:flex;align-items:center;gap:8px;margin-top:10px;max-width:820px;justify-content:flex-start}
  .chip{display:inline-flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);padding:5px 11px;border-radius:18px;font-size:11.5px;font-weight:600}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--mut)}
  .chip.live .dot{background:var(--good);box-shadow:0 0 8px var(--good);animation:pulse 1.8s infinite}
  .chip.load .dot{background:var(--accent);animation:pulse .8s infinite}
  .chip.snap .dot{background:var(--gold)}
  @keyframes pulse{50%{opacity:.35}}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:5px 11px;border-radius:18px;cursor:pointer;font-weight:700;font-size:12px}
  /* nav */
  nav{display:flex;gap:6px;flex-wrap:wrap;margin:14px 0 2px;justify-content:center}
  nav button{background:var(--panel);border:1px solid var(--line);color:var(--mut);padding:8px 13px;border-radius:11px;cursor:pointer;font-weight:700;font-size:13.5px}
  nav button.on{background:var(--accent);color:#0b1120;border-color:var(--accent)}
  section{display:none;animation:fade .2s}
  section.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1}}
  /* cards + tables */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:13px 13px 11px;margin:12px 0;
    backdrop-filter:blur(13px);-webkit-backdrop-filter:blur(13px);box-shadow:0 10px 26px rgba(0,0,0,.32)}
  .card h2{font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--accent);margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .note{color:var(--mut);font-size:12.5px;margin:10px 0;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);padding:9px 12px;border-radius:8px}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:right;font-size:9.5px;text-transform:uppercase;letter-spacing:.2px;color:var(--mut);font-weight:700;padding:5px 4px;border-bottom:1px solid var(--line)}
  th.l,td.l{text-align:left}
  td{padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.06);text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  td.l{white-space:normal;line-height:1.25}
  tr.me td{background:rgba(176,124,255,.14)}
  tr.me td.l{font-weight:800}
  td.nm{text-align:left;white-space:normal}
  .pos{display:inline-block;font-size:9.5px;font-weight:800;padding:1px 5px;border-radius:5px;color:#0b1120;vertical-align:middle}
  .QB{background:#ff6b8a}.RB{background:#37d39a}.WR{background:#5fb2ff}.TE{background:#ffb05f}.K{background:#c9a0ff}.DST{background:#9fb0d0}
  .small{color:var(--mut);font-size:11px}
  .tag{font-size:10px;font-weight:800;padding:1px 6px;border-radius:6px}
  .tag.val{background:rgba(52,211,153,.2);color:#9af5cf}
  .tag.reach{background:rgba(255,124,124,.2);color:#ffb3b3}
  /* board filters */
  .filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
  .filters button{background:var(--panel2);border:1px solid var(--line);color:var(--mut);padding:5px 11px;border-radius:9px;font-weight:800;font-size:12px;cursor:pointer}
  .filters button.on{background:var(--accent);color:#0b1120;border-color:var(--accent)}
  /* my team */
  .grp{margin:4px 0 2px;font-size:11px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;padding-top:6px}
  .needs{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
  .needpill{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:6px 10px;font-size:12px}
  .needpill b{color:var(--warn)}
  .kpi{display:flex;gap:8px;margin:2px 0 8px;flex-wrap:wrap}
  .kpi .b{flex:1;min-width:90px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:9px 10px;text-align:center}
  .kpi .k{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut)}
  .kpi .v{font-size:19px;font-weight:800;margin-top:2px}
  /* commentary */
  .take{font-size:14px;line-height:1.62;padding:9px 0;border-top:1px dashed var(--line)}
  .take:first-child{border-top:0}
  .take b{font-weight:800}
  .foot{color:var(--mut);font-size:11.5px;text-align:center;margin:22px 0 6px;line-height:1.6;padding:0 8px}
</style>
</head>

var STATE={ league:"MWV", tab:"rank", data:{} };

/* ============ DATA ============ */
async function fetchJSON(u){ const r=await fetch(u,{cache:"no-store"}); if(!r.ok) throw new Error(r.status); return r.json(); }
async function loadLeague(lg){
  if(STATE.data[lg]) return STATE.data[lg];
  const sl=LG[lg].slug;
  setChip("load","Loading "+LG[lg].name+"…");
  try{
    const [st,bd,le]=await Promise.all([
      fetchJSON(BASE+"standings-"+sl+".json"),
      fetchJSON(BASE+"board-"+sl+".json"),
      fetchJSON(BASE+"league-"+sl+".json")
    ]);
    const mine=(le.teams||[]).find(t=>t.isMine)||(le.teams||[])[0]||{};
    STATE.data[lg]={ standings:st, board:(bd.players||[]),
      myTeam:{name:mine.name, roster:(mine.roster||[]), summary:mine.summary, needs:(mine.needs||[])},
      live:true, updated:st.updated||bd.updated };
  }catch(e){
    const s=SNAP[lg];
    STATE.data[lg]={ standings:s.standings, board:(s.board.players||[]), myTeam:s.myTeam, live:false, updated:s.standings.updated };
  }
  return STATE.data[lg];
}

/* ============ HEADER / CHIP ============ */
function setChip(cls,txt){ const c=$("#chip"); c.className="chip "+cls; $("#chipTxt").textContent=txt; }
function renderHeader(){
  const d=STATE.data[STATE.league], meta=LG[STATE.league];
  document.documentElement.style.setProperty("--accent", meta.accent);
  $("#brandName").textContent="Fantasy · "+meta.name;
  document.querySelectorAll("#lgToggle button").forEach(b=>b.classList.toggle("on",b.dataset.lg===STATE.league));
  if(!d){ $("#sub").innerHTML="—"; return; }
  const st=d.standings;
  $("#sub").innerHTML=`<b>${esc(d.myTeam&&d.myTeam.name||"—")}</b> · ${esc(st.format||"")}`;
  if(d.live) setChip("live","Live · "+(timeAgo(d.updated)||"updated"));
  else setChip("snap","Snapshot"+(d.updated?(" · "+(new Date(d.updated).toLocaleDateString("en-US",{month:"short",day:"numeric"}))):""));
}

/* ============ RANKINGS / STANDINGS ============ */
function renderRank(){
  const d=STATE.data[STATE.league]; if(!d){ $("#rank").innerHTML='<div class="note">Loading…</div>'; return; }
  const st=d.standings, me=st.myTeam, pts=st.mode==="points";
  let h="";
  if(pts){
    const rows=[...st.season2026].sort((a,b)=>a.rank-b.rank);
    h+=`<div class="card"><h2>🏁 2026 Points Race (projected)</h2>
      <table><thead><tr><th>#</th><th class="l">Team</th><th>Proj</th><th>Gap</th><th>Title%</th></tr></thead><tbody>`+
      rows.map(t=>`<tr class="${t.team===me?"me":""}"><td>${t.rank}</td><td class="l">${esc(t.team)}</td><td>${f0(t.projFinal)}</td><td>${t.gap?("−"+f0(t.gap)):"—"}</td><td>${f1(t.firstPct)}%</td></tr>`).join("")+
      `</tbody></table></div>`;
    if(st.final2025&&st.final2025.length){
      h+=`<div class="card"><h2>📅 2025 Final (points)</h2>
        <table><thead><tr><th>#</th><th class="l">Team</th><th>Off</th><th>Def</th><th>Total</th></tr></thead><tbody>`+
        [...st.final2025].sort((a,b)=>a.rank-b.rank).map(t=>`<tr class="${t.team===me?"me":""}"><td>${t.rank}</td><td class="l">${esc(t.team)}</td><td>${f0(t.off)}</td><td>${f0(t.def)}</td><td>${f0(t.total)}</td></tr>`).join("")+
        `</tbody></table></div>`;
    }
  } else {
    const rows=[...st.season2026].sort((a,b)=>a.powerRank-b.powerRank);
    h+=`<div class="card"><h2>🏆 2026 Power Rankings</h2>
      <table><thead><tr><th>#</th><th class="l">Team</th><th>PPG</th><th>Playoff%</th><th>Champ%</th></tr></thead><tbody>`+
      rows.map(t=>`<tr class="${t.team===me?"me":""}"><td>${t.powerRank}</td><td class="l">${esc(t.team)}<span class="small"> ${esc(t.div||"")}</span></td><td>${f1(t.ppg)}</td><td>${f1(t.playoffPct)}%</td><td>${f1(t.champPct)}%</td></tr>`).join("")+
      `</tbody></table></div>`;
    if(st.final2025&&st.final2025.length){
      h+=`<div class="card"><h2>📅 2025 Final Standings</h2>
        <table><thead><tr><th class="l">Team</th><th>W-L-T</th><th>PF</th><th>PA</th></tr></thead><tbody>`+
        [...st.final2025].sort((a,b)=>b.pf-a.pf).map(t=>`<tr class="${t.team===me?"me":""}"><td class="l">${esc(t.team)}</td><td>${t.w}-${t.l}-${t.t||0}</td><td>${f0(t.pf)}</td><td>${f0(t.pa)}</td></tr>`).join("")+
        `</tbody></table></div>`;
    }
  }
  $("#rank").innerHTML=h;
}

/* ============ MY TEAM ============ */
function renderTeam(){
  const d=STATE.data[STATE.league]; if(!d){ $("#team").innerHTML='<div class="note">Loading…</div>'; return; }
  const mt=d.myTeam||{}, roster=(mt.roster||[]).slice();
  if(!roster.length){ $("#team").innerHTML='<div class="note">Roster not in the feed yet for this league.</div>'; return; }
  const totVbd=roster.reduce((s,p)=>s+(p.vbd||0),0);
  const totPts=roster.reduce((s,p)=>s+(p.ppts||0),0);
  let h=`<div class="card"><h2>🎯 ${esc(mt.name||"My Team")}</h2>
    <div class="kpi">
      <div class="b"><div class="k">Players</div><div class="v">${roster.length}</div></div>
      <div class="b"><div class="k">Roster VBD</div><div class="v">${f0(totVbd)}</div></div>
      <div class="b"><div class="k">Proj pts</div><div class="v">${f0(totPts)}</div></div>
    </div>`;
  POS_ORDER.forEach(P=>{
    const ps=roster.filter(p=>p.pos===P).sort((a,b)=>(b.vbd||-999)-(a.vbd||-999));
    if(!ps.length) return;
    h+=`<div class="grp">${P} <span class="small">· ${ps.length}</span></div>
      <table><tbody>`+ps.map(p=>`<tr><td class="nm"><span class="pos ${p.pos}">${p.pos}</span> ${esc(p.name)} <span class="small">${esc(p.team||"")} · bye ${p.bye||"—"}</span></td><td>${f0(p.ppts)} pt</td><td>${sgn(p.vbd)} <span class="small">v</span></td><td class="small">T${p.tier||"—"}</td></tr>`).join("")+`</tbody></table>`;
  });
  h+=`</div>`;
  // needs
  const needs=(mt.needs||[]).filter(n=>n&&n.pos).slice(0,4);
  if(needs.length){
    h+=`<div class="card"><h2>🛠️ Roster Needs <span class="small" style="text-transform:none;letter-spacing:0;color:var(--mut)">(by this league's scoring)</span></h2>
      <div class="needs">`+needs.map(n=>`<span class="needpill"><b>${esc(n.pos)}</b> · need ${f0(n.score)}${n.depth!=null?(" · depth "+n.depth):""}</span>`).join("")+`</div>
      <div class="note" style="margin-top:10px">Recommendations only — draft/add/drop in CBS yourself.</div></div>`;
  }
  $("#team").innerHTML=h;
}

/* ============ DRAFT BOARD ============ */
var boardPos="ALL";
function renderBoard(){
  const d=STATE.data[STATE.league]; if(!d){ $("#board").innerHTML='<div class="note">Loading…</div>'; return; }
  const meta=LG[STATE.league];
  let list=[...d.board].sort((a,b)=>(a.ovr||9999)-(b.ovr||9999));
  if(boardPos!=="ALL") list=list.filter(p=>p.pos===boardPos);
  const cap=boardPos==="ALL"?100:60; list=list.slice(0,cap);
  const filters=["ALL"].concat(POS_ORDER);
  let h=`<div class="note">Best available re-scored to <b>${meta.name}</b> (${meta.scoring}). <b>VBD</b> = value over a replacement starter · <b>Δ</b> = ADP − your rank (＋ = market value, − = reach) · 🔒 keeper.</div>
    <div class="filters">`+filters.map(p=>`<button data-p="${p}" class="${p===boardPos?"on":""}">${p}</button>`).join("")+`</div>
    <div class="card" style="padding-top:8px"><table><thead><tr><th>#</th><th class="l">Player</th><th>Pts</th><th>VBD</th><th>Δ</th><th>Tier</th></tr></thead><tbody>`+
    list.map(p=>{ const dlt=(p.adp!=null&&p.ovr!=null)?(p.adp-p.ovr):null;
      const tag=dlt==null?"":(dlt>=8?`<span class="tag val">${sgn(dlt)}</span>`:(dlt<=-8?`<span class="tag reach">${sgn(dlt)}</span>`:sgn(dlt)));
      return `<tr><td>${p.ovr||"—"}</td><td class="nm"><span class="pos ${p.pos}">${p.pos}</span> ${esc(p.name)}${p.keeper?" 🔒":""} <span class="small">${esc(p.team||"")} · ${esc(p.posRank||"")} · bye ${p.bye||"—"}</span></td><td>${f0(p.ppts)}</td><td>${sgn(p.vbd)}</td><td>${tag}</td><td class="small">T${p.tier||"—"}</td></tr>`;
    }).join("")+`</tbody></table></div>`;
  $("#board").innerHTML=h;
  document.querySelectorAll("#board .filters button").forEach(b=>b.onclick=()=>{ boardPos=b.dataset.p; renderBoard(); });
}

/* ============ THE TAKE (deterministic narrative) ============ */
function commentary(d){
  const st=d.standings, me=st.myTeam, parts=[];
  if(st.mode==="points"){
    const s=[...st.season2026].sort((a,b)=>a.rank-b.rank), lead=s[0], mine=s.find(t=>t.team===me);
    parts.push(`🏁 <b>Points race.</b> ${esc(lead.team)} projects to win it — ${f0(lead.projFinal)} pts, ${f1(lead.firstPct)}% title odds.`+
      (mine?` Your <b>${esc(me)}</b> sits #${mine.rank} of ${s.length} (${f0(mine.projFinal)} proj, ${mine.gap>0?(f0(mine.gap)+" behind"):"leading"}, ${f1(mine.firstPct)}% to take it)`+
        (mine.rank<=3?" — right in the mix.":mine.rank<=s.length/2?" — within range with a strong draft.":" — needs a big draft to climb."):""));
  } else {
    const s=[...st.season2026].sort((a,b)=>a.powerRank-b.powerRank), lead=s[0], mine=s.find(t=>t.team===me);
    parts.push(`🏆 <b>Power rankings.</b> ${esc(lead.team)} tops the league — ${f1(lead.ppg)} PPG, ${f1(lead.champPct)}% title odds.`+
      (mine?` Your <b>${esc(me)}</b> is #${mine.powerRank} of ${s.length} (${f1(mine.ppg)} PPG, ${f1(mine.playoffPct)}% to make the playoffs, ${f1(mine.champPct)}% to win it all)`+
        (mine.powerRank<=3?" — a genuine contender.":mine.playoffPct>=50?" — in the hunt.":" — work to do."):""));
  }
  const mt=d.myTeam||{};
  if(mt.summary){
    const byTop=Object.entries(mt.summary).filter(([k,v])=>v&&v.topVbd!=null).sort((a,b)=>(b[1].topVbd)-(a[1].topVbd));
    const strong=byTop[0];
    const needs=(mt.needs||[]).filter(n=>n&&n.score>12).slice(0,2).map(n=>n.pos);
    parts.push(`🎯 <b>Your roster.</b> Strongest at <b>${strong?strong[0]:"—"}</b>${strong?` (top value ${sgn(strong[1].topVbd)} VBD)`:""}. `+
      (needs.length?`Biggest gap${needs.length>1?"s":""}: <b>${needs.join(" & ")}</b> — target before Week 1.`:`No glaring holes — stay flexible and draft best-available.`));
  }
  const top=[...d.board].sort((a,b)=>(a.ovr||9999)-(b.ovr||9999));
  const pick=P=>top.find(p=>p.pos===P);
  parts.push(`📊 <b>Top of the board.</b> ${top[0]?`${esc(top[0].name)} is the #1 value (${sgn(top[0].vbd)} VBD) by ${LG[STATE.league].scoring}.`:""} `+
    `Best available — RB <b>${(pick("RB")||{}).name||"—"}</b>, WR <b>${(pick("WR")||{}).name||"—"}</b>, TE <b>${(pick("TE")||{}).name||"—"}</b>, QB <b>${(pick("QB")||{}).name||"—"}</b>.`);
  // tier cliff: first position where tier jumps among top 24
  const cliff=(()=>{ const t24=top.slice(0,30); for(const P of ["RB","WR"]){ const ps=t24.filter(p=>p.pos===P); for(let i=0;i<ps.length-1;i++){ if((ps[i+1].tier||0)-(ps[i].tier||0)>=2) return `${P}: tier drops after ${esc(ps[i].name)} — grab a ${P} before the cliff.`; } } return null; })();
  if(cliff) parts.push(`⛰️ <b>Tier cliff.</b> ${cliff}`);
  return parts;
}
function renderTake(){
  const d=STATE.data[STATE.league]; if(!d){ $("#take").innerHTML='<div class="note">Loading…</div>'; return; }
  const parts=commentary(d);
  $("#take").innerHTML=`<div class="card"><h2>🧠 The Take · ${esc(LG[STATE.league].name)}</h2>`+
    parts.map(p=>`<div class="take">${p}</div>`).join("")+
    `<div class="note" style="margin-top:11px">Auto-generated from your league's projections &amp; standings — same data, same read every time. Analysis only; you make the moves.</div></div>`;
}

  render();
  delete STATE.data[STATE.league];
  await loadLeague(STATE.league); render();
})();

if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
